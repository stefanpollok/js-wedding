<section style="text-align: center; padding: 1.5em 1em; font-size: 1.4em; font-weight: 600; color: #6c5e5e;">
  <span id="wedding-countdown"></span>
</section>
<script>
  (function () {
    var wedding = new Date("2026-09-05T13:00:00");
    var now = new Date();
    var msPerDay = 1000 * 60 * 60 * 24;
    var days = Math.ceil((wedding - now) / msPerDay);
    var el = document.getElementById("wedding-countdown");
    if (days > 1) {
      el.innerHTML = '<span class="lang-en">Only ' + days + ' days to go!</span>'
                   + '<span class="lang-de">Noch ' + days + ' Tage!</span>'
                   + '<span class="lang-dk">Kun ' + days + ' dage tilbage!</span>';
    } else if (days === 1) {
      el.innerHTML = '<span class="lang-en">Only 1 day to go!</span>'
                   + '<span class="lang-de">Nur noch ein Tag!</span>'
                   + '<span class="lang-dk">Kun en dag tilbage!</span>';
    } else if (days === 0) {
      el.innerHTML = '<span class="lang-en">Today is the day!</span>'
                   + '<span class="lang-de">Heute ist der Tag!</span>'
                   + '<span class="lang-dk">I dag er dagen!</span>';
    } else {
      el.innerHTML = '<span class="lang-en">We are married!</span>'
                   + '<span class="lang-de">Wir sind verheiratet!</span>'
                   + '<span class="lang-dk">Vi er gift!</span>';
    }
  })();
</script>
